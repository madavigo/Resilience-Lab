apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vault
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://helm.releases.hashicorp.com
    chart: vault
    targetRevision: "0.28.1"
    helm:
      values: |
        global:
          enabled: true
          tlsDisable: true

        server:
          # Dev mode is OFF — this is a real, unsealed Vault
          dev:
            enabled: false

          ha:
            enabled: false   # Single-master lab; no HA needed
            replicas: 1

          ingress:
            enabled: true
            ingressClassName: nginx
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-prod
            hosts:
              - host: vault.madavigo.com
                paths:
                  - /
            tls:
              - secretName: vault-tls
                hosts:
                  - vault.madavigo.com

          dataStorage:
            enabled: true
            size: 10Gi
            storageClass: ceph-block

          auditStorage:
            enabled: true
            size: 5Gi
            storageClass: ceph-block

          # Auto-unseal via postStart lifecycle hook
          # Runs after Vault container starts, waits for Vault to be ready,
          # then unseals if sealed using keys from vault-unseal-keys secret
          extraEnvironmentVars:
            VAULT_ADDR: "http://127.0.0.1:8200"

          extraSecretEnvironmentVars:
            - envName: UNSEAL_KEY1
              secretName: vault-unseal-keys
              secretKey: key1
            - envName: UNSEAL_KEY2
              secretName: vault-unseal-keys
              secretKey: key2
            - envName: UNSEAL_KEY3
              secretName: vault-unseal-keys
              secretKey: key3

          postStart:
            - sh
            - -c
            - |
              sleep 5
              until vault status 2>/dev/null | grep -q "Initialized"; do
                sleep 2
              done
              SEALED=$(vault status 2>/dev/null | grep "^Sealed" | awk '{print $2}')
              if [ "$SEALED" = "true" ]; then
                echo "Vault sealed — auto-unsealing..."
                vault operator unseal "$UNSEAL_KEY1"
                vault operator unseal "$UNSEAL_KEY2"
                vault operator unseal "$UNSEAL_KEY3"
                echo "Auto-unseal complete."
              else
                echo "Vault already unsealed."
              fi

          # configAnnotation adds a pod annotation with a hash of the ConfigMap
          # so that any config change automatically triggers a StatefulSet rollout.
          configAnnotation: true

          standalone:
            # Full server HCL config for standalone (non-HA) mode.
            # In vault-helm 0.28.1 this lives at server.standalone.config.
            # Both telemetry stanzas are required: the top-level one enables
            # Prometheus metrics; the listener one allows unauthenticated scraping.
            config: |
              ui = true

              listener "tcp" {
                tls_disable     = 1
                address         = "[::]:8200"
                cluster_address = "[::]:8201"
                telemetry {
                  unauthenticated_metrics_access = true
                }
              }

              storage "file" {
                path = "/vault/data"
              }

              telemetry {
                prometheus_retention_time = "30s"
                disable_hostname          = true
              }

        ui:
          enabled: true

        injector:
          # Using External Secrets Operator instead of Vault Agent Injector
          enabled: false

        # Expose Prometheus metrics via /v1/sys/metrics
        # unauthenticated_metrics_access lets Prometheus scrape without a token
        serverTelemetry:
          serviceMonitor:
            enabled: true
            selectors:
              release: kube-prometheus
  destination:
    server: https://kubernetes.default.svc
    namespace: vault
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
