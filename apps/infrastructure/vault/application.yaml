apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vault
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://helm.releases.hashicorp.com
    chart: vault
    targetRevision: "0.28.1"
    helm:
      values: |
        global:
          enabled: true
          tlsDisable: true

        server:
          # Dev mode is OFF — this is a real, unsealed Vault
          dev:
            enabled: false

          ha:
            enabled: false   # Single-master lab; no HA needed
            replicas: 1

          ingress:
            enabled: true
            ingressClassName: nginx
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-prod
              nginx.ingress.kubernetes.io/auth-url: http://ak-outpost-nginx-outpost.authentik.svc.cluster.local:9000/outpost.goauthentik.io/auth/nginx
              nginx.ingress.kubernetes.io/auth-signin: https://auth.madavigo.com/outpost.goauthentik.io/start?rd=$scheme://$host$escaped_request_uri
              nginx.ingress.kubernetes.io/auth-response-headers: Set-Cookie,X-authentik-username,X-authentik-groups,X-authentik-entitlements,X-authentik-email,X-authentik-name,X-authentik-uid
            hosts:
              - host: vault.madavigo.com
                paths:
                  - /
            tls:
              - secretName: vault-tls
                hosts:
                  - vault.madavigo.com

          dataStorage:
            enabled: true
            size: 10Gi
            storageClass: ceph-block

          auditStorage:
            enabled: true
            size: 5Gi
            storageClass: ceph-block

          # Auto-unseal via postStart lifecycle hook
          # Runs after Vault container starts, waits for Vault to be ready,
          # then unseals if sealed using keys from vault-unseal-keys secret
          extraEnvironmentVars:
            VAULT_ADDR: "http://127.0.0.1:8200"

          extraSecretEnvironmentVars:
            - envName: UNSEAL_KEY1
              secretName: vault-unseal-keys
              secretKey: key1
            - envName: UNSEAL_KEY2
              secretName: vault-unseal-keys
              secretKey: key2
            - envName: UNSEAL_KEY3
              secretName: vault-unseal-keys
              secretKey: key3

          postStart:
            - sh
            - -c
            - |
              sleep 5
              until vault status 2>/dev/null | grep -q "Initialized"; do
                sleep 2
              done
              SEALED=$(vault status 2>/dev/null | grep "^Sealed" | awk '{print $2}')
              if [ "$SEALED" = "true" ]; then
                echo "Vault sealed — auto-unsealing..."
                vault operator unseal "$UNSEAL_KEY1"
                vault operator unseal "$UNSEAL_KEY2"
                vault operator unseal "$UNSEAL_KEY3"
                echo "Auto-unseal complete."
              else
                echo "Vault already unsealed."
              fi

          # Append telemetry stanza to vault server HCL config so Prometheus
          # can scrape /v1/sys/metrics without a token.
          extraConfig: |
            telemetry {
              prometheus_retention_time        = "30s"
              disable_hostname                 = true
              unauthenticated_metrics_access   = true
            }

        ui:
          enabled: true

        injector:
          # Using External Secrets Operator instead of Vault Agent Injector
          enabled: false

        # Expose Prometheus metrics via /v1/sys/metrics
        # unauthenticated_metrics_access lets Prometheus scrape without a token
        serverTelemetry:
          serviceMonitor:
            enabled: true
            selectors:
              release: kube-prometheus
  destination:
    server: https://kubernetes.default.svc
    namespace: vault
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
