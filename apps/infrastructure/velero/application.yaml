# Tier 3 DR -- Velero PVC backup to TrueNAS MinIO
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: velero
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://vmware-tanzu.github.io/helm-charts
    chart: velero
    targetRevision: "12.0.0"
    helm:
      values: |
        configuration:
          backupStorageLocation:
            - name: default
              provider: aws
              bucket: velero
              default: true
              config:
                region: us-east-1
                s3Url: http://10.10.67.170:9003
                s3ForcePathStyle: "true"

        credentials:
          existingSecret: velero-minio

        snapshotsEnabled: false
        deployNodeAgent: true

        nodeAgent:
          podVolumePath: /var/lib/kubelet/pods

        initContainers:
          - name: velero-plugin-for-aws
            image: velero/velero-plugin-for-aws:v1.11.1
            volumeMounts:
              - mountPath: /target
                name: plugins

        schedules:
          daily-pvc-backup:
            disabled: false
            schedule: "0 2 * * *"
            template:
              ttl: 336h
              includedNamespaces:
                - vault
                - authentik
                - observability
              defaultVolumesToFsBackup: true
  destination:
    server: https://kubernetes.default.svc
    namespace: velero
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: velero-minio
  namespace: velero
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: velero-minio
    creationPolicy: Owner
    template:
      data:
        cloud: |
          [default]
          aws_access_key_id={{ .access_key }}
          aws_secret_access_key={{ .secret_key }}
  data:
    - secretKey: access_key
      remoteRef:
        key: secret/resilience-lab/velero
        property: aws-access-key-id
    - secretKey: secret_key
      remoteRef:
        key: secret/resilience-lab/velero
        property: aws-secret-access-key
