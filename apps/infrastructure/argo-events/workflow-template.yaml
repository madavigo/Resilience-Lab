# WorkflowTemplate -- sends ntfy push notification when a Gitea issue is opened
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: gitea-issue-notify
  namespace: argo-events
spec:
  entrypoint: notify
  arguments:
    parameters:
      - name: issue-title
      - name: issue-number
      - name: issue-url
      - name: issue-body
      - name: issue-user
  ttlStrategy:
    secondsAfterCompletion: 3600
    secondsAfterFailure: 86400
  serviceAccountName: argo-events-sensor
  templates:
    - name: notify
      inputs:
        parameters:
          - name: issue-title
          - name: issue-number
          - name: issue-url
          - name: issue-body
          - name: issue-user
      container:
        image: alpine:3.20
        # All Argo parameter substitutions are in env vars, NOT inline in the
        # shell script. This prevents backticks, $(...), {}, and other shell
        # metacharacters in issue bodies from breaking or injecting commands.
        command:
          - sh
          - -c
          - |
            apk add --no-cache -q curl
            printf '%s\n\n%s' "$ISSUE_USER" "$ISSUE_BODY" | \
              curl -s \
                -H "Title: [Resilience-Lab] #${ISSUE_NUMBER}: ${ISSUE_TITLE}" \
                -H "Priority: default" \
                -H "Tags: rotating_light" \
                -H "Click: ${ISSUE_URL}" \
                --data-binary @- \
                "https://ntfy.sh/${NTFY_TOPIC}"
        env:
          - name: NTFY_TOPIC
            valueFrom:
              secretKeyRef:
                name: ntfy-topic
                key: topic
          - name: ISSUE_TITLE
            value: "{{inputs.parameters.issue-title}}"
          - name: ISSUE_NUMBER
            value: "{{inputs.parameters.issue-number}}"
          - name: ISSUE_URL
            value: "{{inputs.parameters.issue-url}}"
          - name: ISSUE_BODY
            value: "{{inputs.parameters.issue-body}}"
          - name: ISSUE_USER
            value: "{{inputs.parameters.issue-user}}"
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
---
# WorkflowTemplate -- runs riff-poster-sync against Emby RiffTrax library
# Triggered by the Sensor when Emby fires a new-item webhook
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: rifftrax-poster-sync
  namespace: argo-events
spec:
  entrypoint: sync
  serviceAccountName: argo-events-sensor
  ttlStrategy:
    secondsAfterCompletion: 86400    # keep completed workflows 24h for debugging
    secondsAfterSuccess: 3600
    secondsAfterFailure: 86400
  templates:
    - name: sync
      container:
        image: python:3.12-slim
        command:
          - sh
          - -c
          - |
            apt-get update -qq && apt-get install -y -qq git && \
            echo "machine git.madavigo.com login matt password $GITEA_TOKEN" > /root/.netrc && \
            chmod 600 /root/.netrc && \
            pip install --quiet git+https://git.madavigo.com/madavigo/riff-poster-sync.git && \
            rifftrax-poster-sync sync \
              --host "$EMBY_HOST" \
              --api-key "$EMBY_API_KEY" \
              --library "$LIBRARY" \
              --cache-dir /tmp/rifftrax-cache
        env:
          - name: GITEA_TOKEN
            valueFrom:
              secretKeyRef:
                name: rifftrax-poster-sync
                key: gitea_token
          - name: EMBY_HOST
            valueFrom:
              secretKeyRef:
                name: rifftrax-poster-sync
                key: emby_host
          - name: EMBY_API_KEY
            valueFrom:
              secretKeyRef:
                name: rifftrax-poster-sync
                key: emby_api_key
          - name: LIBRARY
            valueFrom:
              secretKeyRef:
                name: rifftrax-poster-sync
                key: library
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
