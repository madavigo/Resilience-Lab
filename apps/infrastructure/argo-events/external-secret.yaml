apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: rifftrax-poster-sync
  namespace: argo-events
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: rifftrax-poster-sync
    creationPolicy: Owner
  data:
    - secretKey: emby_api_key
      remoteRef:
        key: secret/resilience-lab/rifftrax-poster-sync
        property: emby_api_key
    - secretKey: emby_host
      remoteRef:
        key: secret/resilience-lab/rifftrax-poster-sync
        property: emby_host
    - secretKey: library
      remoteRef:
        key: secret/resilience-lab/rifftrax-poster-sync
        property: library
