# ServiceAccount for Argo Events sensor to submit workflows
apiVersion: v1
kind: ServiceAccount
metadata:
  name: argo-events-sensor
  namespace: argo-events
---
# Role to allow sensor to create Argo Workflow resources
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argo-events-sensor
  namespace: argo-events
rules:
  - apiGroups:
      - argoproj.io
    resources:
      - workflows
      - workflowtemplates
      - workflowtaskresults
    verbs:
      - create
      - get
      - list
      - watch
      - patch
  - apiGroups:
      - ""
    resources:
      - secrets
      - pods
      - pods/log
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argo-events-sensor
  namespace: argo-events
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: argo-events-sensor
subjects:
  - kind: ServiceAccount
    name: argo-events-sensor
    namespace: argo-events
