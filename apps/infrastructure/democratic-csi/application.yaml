apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: democratic-csi-config
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: default
  source:
    repoURL: https://github.com/madavigo/Resilience-Lab.git
    targetRevision: main
    path: apps/infrastructure/democratic-csi
    directory:
      include: "external-secret.yaml"
  destination:
    server: https://kubernetes.default.svc
    namespace: democratic-csi
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: democratic-csi
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://democratic-csi.github.io/charts/
    chart: democratic-csi
    targetRevision: "0.15.1"
    helm:
      releaseName: truenas-nfs
      values: |
        csiDriver:
          name: "org.democratic-csi.nfs"

        storageClasses:
          - name: truenas-nfs
            defaultClass: false
            reclaimPolicy: Retain
            volumeBindingMode: Immediate
            allowVolumeExpansion: true
            parameters:
              fsType: nfs

        driver:
          existingConfigSecret: truenas-api-credentials
          config:
            driver: freenas-api-nfs
            instance_id: ""
            httpConnection:
              protocol: https
              host: 10.10.67.170
              port: 443
              allowInsecure: true
              apiVersion: 2
              apiKey: ""          # overridden by existingConfigSecret at runtime
            zfs:
              datasetParentName: SATA1/k8s/volumes
              detachedSnapshotsDatasetParentName: SATA1/k8s/snapshots
              datasetEnableQuotas: true
              datasetEnableReservation: false
              datasetPermissionsMode: "0777"
              datasetPermissionsUser: 0
              datasetPermissionsGroup: 0
            nfs:
              shareHost: 10.10.67.170
              shareAlldirs: false
              shareAllowedHosts: []
              shareAllowedNetworks:
                - 10.10.67.0/24
              shareMaprootUser: root
              shareMaprootGroup: root
  destination:
    server: https://kubernetes.default.svc
    namespace: democratic-csi
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
