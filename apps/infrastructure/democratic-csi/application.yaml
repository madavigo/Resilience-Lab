apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: democratic-csi-config
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: default
  source:
    repoURL: https://github.com/madavigo/Resilience-Lab.git
    targetRevision: main
    path: apps/infrastructure/democratic-csi
    directory:
      include: "external-secret.yaml"
  destination:
    server: https://kubernetes.default.svc
    namespace: democratic-csi
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: democratic-csi
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://democratic-csi.github.io/charts/
    chart: democratic-csi
    targetRevision: "0.15.1"
    helm:
      releaseName: truenas-nfs
      values: |
        csiDriver:
          name: "org.democratic-csi.nfs"

        storageClasses:
          - name: truenas-nfs
            defaultClass: false
            reclaimPolicy: Retain
            volumeBindingMode: Immediate
            allowVolumeExpansion: true
            parameters:
              fsType: nfs

        # Credentials live in the pre-existing truenas-api-credentials secret
        # (contains driver-config-file.yaml with apiKey)
        driver:
          existingConfigSecret: truenas-api-credentials
  destination:
    server: https://kubernetes.default.svc
    namespace: democratic-csi
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
