# ExternalSecret pulls TrueNAS API credentials from Vault
# and injects them as a K8s Secret consumed by democratic-csi
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: truenas-api-credentials
  namespace: democratic-csi
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: truenas-api-credentials
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: secret/resilience-lab/truenas
        property: username
    - secretKey: password
      remoteRef:
        key: secret/resilience-lab/truenas
        property: password
