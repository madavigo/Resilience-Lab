grafana:
  envFromSecret: grafana-oauth
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      folderAnnotation: grafana_folder
      provider:
        foldersFromFilesStructure: true
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: resilience-lab
          orgId: 1
          folder: Resilience-Lab
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/resilience-lab
        - name: private-apps
          orgId: 1
          folder: Private Apps
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/private-apps
  dashboards:
    resilience-lab:
      ceph-cluster:
        gnetId: 2842
        revision: 17
        datasource: Prometheus
      ceph-osd:
        gnetId: 5336
        revision: 9
        datasource: Prometheus
      ceph-pools:
        gnetId: 5342
        revision: 9
        datasource: Prometheus
      cert-manager:
        gnetId: 20842
        revision: 3
        datasource: Prometheus
      velero:
        gnetId: 16829
        revision: 3
        datasource: Prometheus
      node-exporter-full:
        gnetId: 1860
        revision: 37
        datasource: Prometheus
    private-apps:
      navidrome:
        gnetId: 14237
        revision: 1
        datasource: Prometheus
  additionalDataSources:
    - name: Loki
      type: loki
      access: proxy
      url: http://loki.observability.svc.cluster.local:3100
      isDefault: false
      jsonData:
        maxLines: 1000
  persistence:
    enabled: true
    storageClassName: truenas-nfs
    size: 5Gi
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
    hosts:
      - grafana.madavigo.com
    tls:
      - secretName: grafana-tls
        hosts:
          - grafana.madavigo.com
  grafana.ini:
    server:
      root_url: https://grafana.madavigo.com
    auth:
      oauth_auto_login: true
    auth.generic_oauth:
      enabled: true
      name: Authentik
      allow_sign_up: true
      scopes: openid profile email
      auth_url: https://auth.madavigo.com/application/o/authorize/
      token_url: http://authentik-server.authentik.svc.cluster.local/application/o/token/
      api_url: http://authentik-server.authentik.svc.cluster.local/application/o/userinfo/
      role_attribute_path: "contains(groups[*], 'authentik Admins') && 'Admin' || 'Viewer'"

prometheus:
  prometheusSpec:
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: truenas-nfs
          resources:
            requests:
              storage: 20Gi

alertmanager:
  config:
    global:
      resolve_timeout: 5m
    route:
      receiver: "null"
      group_by: [alertname, namespace, severity]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      routes:
        # Route all warning/critical alerts from any namespace to Lux
        - receiver: lux
          matchers:
            - name: severity
              matchType: =~
              value: "warning|critical"
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 4h
          continue: true
        # Silence the Watchdog heartbeat alert
        - receiver: "null"
          matchers:
            - name: alertname
              matchType: =
              value: "Watchdog"
    receivers:
      - name: "null"
      - name: lux
        webhook_configs:
          - url: "http://lux.lux.svc.cluster.local/webhooks/alertmanager"
            send_resolved: true
            http_config:
              authorization:
                type: Bearer
                credentials_file: /etc/alertmanager/secrets/lux-webhook-token/token
    inhibit_rules:
      - source_matchers:
          - severity="critical"
        target_matchers:
          - severity=~"warning|info"
        equal: [namespace, alertname]
      - source_matchers:
          - severity="warning"
        target_matchers:
          - severity="info"
        equal: [namespace, alertname]
  alertmanagerSpec:
    secrets:
      - lux-webhook-token
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: truenas-nfs
          resources:
            requests:
              storage: 5Gi
