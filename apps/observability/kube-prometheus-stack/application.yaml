apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: "82.15.1"
    helm:
      releaseName: kube-prometheus
      values: |
        # --- Prometheus ---
        prometheus:
          prometheusSpec:
            retention: 30d
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: truenas-nfs
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 20Gi
            # Scrape etcd metrics from the NUC (exposed on port 2381)
            additionalScrapeConfigs:
              - job_name: etcd
                static_configs:
                  - targets: ["10.10.67.48:2381"]
              - job_name: ceph-mgr
                static_configs:
                  - targets: ["rook-ceph-mgr.rook-ceph.svc.cluster.local:9283"]

        # --- Grafana ---
        grafana:
          enabled: true
          adminPassword: ""    # Injected via ESO ExternalSecret
          persistence:
            enabled: true
            storageClassName: truenas-nfs
            size: 5Gi
          ingress:
            enabled: true
            ingressClassName: nginx
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-prod
            hosts:
              - grafana.madavigo.com
            tls:
              - secretName: grafana-tls
                hosts:
                  - grafana.madavigo.com
          # Pre-provision dashboards
          dashboardProviders:
            dashboardproviders.yaml:
              apiVersion: 1
              providers:
                - name: default
                  orgId: 1
                  folder: "Resilience-Lab"
                  type: file
                  disableDeletion: false
                  options:
                    path: /var/lib/grafana/dashboards/default
          dashboards:
            default:
              ceph-cluster:
                gnetId: 2842
                revision: 17
                datasource: Prometheus
              ceph-osd:
                gnetId: 5336
                revision: 9
                datasource: Prometheus
              node-exporter:
                gnetId: 1860
                revision: 37
                datasource: Prometheus
              kubernetes-cluster:
                gnetId: 7249
                revision: 1
                datasource: Prometheus

        # --- Alertmanager ---
        alertmanager:
          enabled: true
          alertmanagerSpec:
            storage:
              volumeClaimTemplate:
                spec:
                  storageClassName: truenas-nfs
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 5Gi

        # --- Node Exporter ---
        nodeExporter:
          enabled: true

        # --- kube-state-metrics ---
        kubeStateMetrics:
          enabled: true

        # Disable admission webhooks — they use pre-sync hook jobs that
        # conflict with ArgoCD selfHeal (hooks get recreated before deletion)
        prometheusOperator:
          admissionWebhooks:
            enabled: false
            patch:
              enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
