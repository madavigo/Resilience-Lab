apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: "82.15.1"
    helm:
      releaseName: kube-prometheus
      values: |
        # --- Prometheus ---
        prometheus:
          prometheusSpec:
            retention: 30d
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: truenas-nfs
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 20Gi
            # Scrape etcd metrics from the NUC (exposed on port 2381)
            additionalScrapeConfigs:
              - job_name: etcd
                static_configs:
                  - targets: ["10.10.67.48:2381"]
              - job_name: ceph-mgr
                static_configs:
                  - targets: ["rook-ceph-mgr.rook-ceph.svc.cluster.local:9283"]

        # --- Grafana ---
        grafana:
          enabled: true
          admin:
            existingSecret: kube-prometheus-grafana
            userKey: admin-user
            passwordKey: admin-password
          envFromSecret: grafana-oauth
          deploymentStrategy:
            type: Recreate
          persistence:
            enabled: true
            storageClassName: truenas-nfs
            size: 5Gi
          ingress:
            enabled: true
            ingressClassName: nginx
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-prod
            hosts:
              - grafana.madavigo.com
            tls:
              - secretName: grafana-tls
                hosts:
                  - grafana.madavigo.com
          grafana.ini:
            server:
              root_url: https://grafana.madavigo.com
            auth:
              oauth_auto_login: true
            auth.generic_oauth:
              enabled: true
              name: Authentik
              allow_sign_up: true
              scopes: openid profile email
              auth_url: https://auth.madavigo.com/application/o/authorize/
              token_url: http://authentik-server.authentik.svc.cluster.local/application/o/token/
              api_url: http://authentik-server.authentik.svc.cluster.local/application/o/userinfo/
              role_attribute_path: "contains(groups[*], 'authentik Admins') && 'Admin' || 'Viewer'"
          sidecar:
            dashboards:
              enabled: true
              label: grafana_dashboard
              folderAnnotation: grafana_folder
              provider:
                foldersFromFilesStructure: true
          additionalDataSources:
            - name: Loki
              type: loki
              access: proxy
              url: http://loki.observability.svc.cluster.local:3100
              isDefault: false
              jsonData:
                maxLines: 1000
          dashboardProviders:
            dashboardproviders.yaml:
              apiVersion: 1
              providers:
                - name: resilience-lab
                  orgId: 1
                  folder: "Resilience-Lab"
                  type: file
                  disableDeletion: false
                  editable: true
                  options:
                    path: /var/lib/grafana/dashboards/resilience-lab
                - name: private-apps
                  orgId: 1
                  folder: "Private Apps"
                  type: file
                  disableDeletion: false
                  editable: true
                  options:
                    path: /var/lib/grafana/dashboards/private-apps
          dashboards:
            resilience-lab:
              ceph-cluster:
                gnetId: 2842
                revision: 17
                datasource: Prometheus
              ceph-osd:
                gnetId: 5336
                revision: 9
                datasource: Prometheus
              ceph-pools:
                gnetId: 5342
                revision: 9
                datasource: Prometheus
              cert-manager:
                gnetId: 20842
                revision: 3
                datasource: Prometheus
              velero:
                gnetId: 16829
                revision: 3
                datasource: Prometheus
              node-exporter-full:
                gnetId: 1860
                revision: 37
                datasource: Prometheus
            private-apps:
              navidrome:
                gnetId: 14237
                revision: 1
                datasource: Prometheus

        # --- Alertmanager ---
        alertmanager:
          enabled: true
          alertmanagerSpec:
            storage:
              volumeClaimTemplate:
                spec:
                  storageClassName: truenas-nfs
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 5Gi

        # --- Node Exporter ---
        nodeExporter:
          enabled: true

        # --- kube-state-metrics ---
        kubeStateMetrics:
          enabled: true

        # Disable admission webhooks — they use pre-sync hook jobs that
        # conflict with ArgoCD selfHeal (hooks get recreated before deletion)
        prometheusOperator:
          admissionWebhooks:
            enabled: false
            patch:
              enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
