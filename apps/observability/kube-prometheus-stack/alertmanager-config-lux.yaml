apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: lux
  namespace: observability
spec:
  route:
    receiver: lux
    groupBy: [alertname, namespace, severity]
    groupWait: 30s
    groupInterval: 5m
    repeatInterval: 4h
    # Only route warning+ to Lux; info stays in default null receiver
    matchers:
      - name: severity
        matchType: =~
        value: "warning|critical"
  receivers:
    - name: lux
      webhookConfigs:
        - url: http://lux.lux.svc.cluster.local/webhooks/alertmanager
          sendResolved: true
          httpConfig:
            authorization:
              type: Bearer
              credentials:
                name: lux-webhook-token
                key: token
