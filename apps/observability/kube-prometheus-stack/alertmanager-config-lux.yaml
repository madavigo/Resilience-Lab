apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: lux-webhook-token
  namespace: observability
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: lux-webhook-token
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: token
      remoteRef:
        key: secret/resilience-lab/lux
        property: webhook-token
---
apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: lux
  namespace: observability
spec:
  route:
    receiver: lux
    groupBy: [alertname, namespace, severity]
    groupWait: 30s
    groupInterval: 5m
    repeatInterval: 4h
    # Only route warning+ to Lux; info stays in default null receiver
    matchers:
      - name: severity
        matchType: =~
        value: "warning|critical"
  receivers:
    - name: lux
      webhookConfigs:
        - url: https://lux.madavigo.com/webhooks/alertmanager
          sendResolved: true
          httpConfig:
            authorization:
              type: Bearer
              credentials:
                name: lux-webhook-token
                key: token
