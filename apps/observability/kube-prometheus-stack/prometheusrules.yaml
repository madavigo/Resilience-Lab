# Custom PrometheusRules for Resilience-Lab
# Supplements the default kube-prometheus-stack ruleset with
# app-specific and infrastructure-specific alerting.
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: resilience-lab-media
  namespace: observability
  labels:
    release: kube-prometheus
spec:
  groups:

    # ──────────────────────────────────────────────────────────────────────────
    # Media namespace — PVC capacity
    #
    # The default KubePersistentVolumeFillingUp [warning] only fires when
    # predict_linear() forecasts exhaustion within 4 days. That is unreliable
    # on large slowly-growing volumes (10Ti media shares). These rules fire on
    # a simple percentage threshold regardless of growth rate.
    # ──────────────────────────────────────────────────────────────────────────
    - name: media.pvc
      rules:

        # > 85% full — warning, sustained 15 min
        - alert: MediaPVCFillingUp
          expr: |
            (
              1 - (
                kubelet_volume_stats_available_bytes{namespace="media"}
                /
                kubelet_volume_stats_capacity_bytes{namespace="media"}
              )
            ) > 0.85
          for: 15m
          labels:
            severity: warning
            namespace: media
          annotations:
            summary: "Media PVC {{ $labels.persistentvolumeclaim }} is {{ $value | humanizePercentage }} full"
            description: >
              PVC {{ $labels.persistentvolumeclaim }} in namespace {{ $labels.namespace }}
              is {{ $value | humanizePercentage }} full.
              Consider expanding the volume or clearing old data.
            runbook_url: "https://runbooks.prometheus-operator.dev/runbooks/kubernetes/kubepersistentvolumefillingup"

        # > 95% full — critical, sustained 5 min
        - alert: MediaPVCCritical
          expr: |
            (
              1 - (
                kubelet_volume_stats_available_bytes{namespace="media"}
                /
                kubelet_volume_stats_capacity_bytes{namespace="media"}
              )
            ) > 0.95
          for: 5m
          labels:
            severity: critical
            namespace: media
          annotations:
            summary: "Media PVC {{ $labels.persistentvolumeclaim }} is critically full ({{ $value | humanizePercentage }})"
            description: >
              PVC {{ $labels.persistentvolumeclaim }} in namespace {{ $labels.namespace }}
              is {{ $value | humanizePercentage }} full. Writes may fail imminently.
            runbook_url: "https://runbooks.prometheus-operator.dev/runbooks/kubernetes/kubepersistentvolumefillingup"

        # Config PVCs (≤ 10Gi) warn earlier at 70% — they are small and
        # harder to expand quickly (Ceph block, RWO).
        - alert: MediaConfigPVCFillingUp
          expr: |
            (
              1 - (
                kubelet_volume_stats_available_bytes{namespace="media"}
                /
                kubelet_volume_stats_capacity_bytes{namespace="media"}
              )
            ) > 0.70
            and
            kubelet_volume_stats_capacity_bytes{namespace="media"} <= (10 * 1024 * 1024 * 1024)
          for: 15m
          labels:
            severity: warning
            namespace: media
          annotations:
            summary: "Media config PVC {{ $labels.persistentvolumeclaim }} is {{ $value | humanizePercentage }} full"
            description: >
              Small config PVC {{ $labels.persistentvolumeclaim }} (≤ 10Gi) in namespace
              {{ $labels.namespace }} is {{ $value | humanizePercentage }} full.
              These are RWO Ceph block volumes — resize before the app runs out of space.
            runbook_url: "https://runbooks.prometheus-operator.dev/runbooks/kubernetes/kubepersistentvolumefillingup"

    # ──────────────────────────────────────────────────────────────────────────
    # Media namespace — application health
    # ──────────────────────────────────────────────────────────────────────────
    - name: media.apps
      rules:

        # Any media app pod stuck not-ready for > 15 min.
        # Exclude terminal-phase pods (Succeeded/Failed) — completed CronJob pods
        # are correctly not-ready but should not alert (recyclarr false-positive, issue #13).
        - alert: MediaAppNotReady
          expr: |
            kube_pod_status_ready{namespace="media", condition="true"} == 0
              unless on(pod, namespace)
            kube_pod_status_phase{phase=~"Succeeded|Failed", namespace="media"} == 1
          for: 15m
          labels:
            severity: warning
            namespace: media
          annotations:
            summary: "Media app pod {{ $labels.pod }} is not ready"
            description: >
              Pod {{ $labels.pod }} in namespace media has been not-ready for
              more than 15 minutes. Check for image pull errors, OOMKill, or
              missing PVC mounts.

        # Any media app in CrashLoopBackOff
        - alert: MediaAppCrashLooping
          expr: |
            rate(kube_pod_container_status_restarts_total{namespace="media"}[15m]) * 60 * 15 > 3
          for: 5m
          labels:
            severity: warning
            namespace: media
          annotations:
            summary: "Media app {{ $labels.container }} is crash-looping"
            description: >
              Container {{ $labels.container }} in pod {{ $labels.pod }} (namespace media)
              has restarted more than 3 times in the last 15 minutes.

    # ──────────────────────────────────────────────────────────────────────────
    # etcd backup — job health
    # The default KubeJobFailed fires but with a generic message. This adds
    # a targeted alert with context specific to the backup job.
    # ──────────────────────────────────────────────────────────────────────────
    - name: etcd-backup
      rules:

        - alert: EtcdSnapshotFailed
          expr: |
            kube_job_failed{namespace="etcd-backup", job_name=~"etcd-snapshot-.*"} > 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "etcd snapshot job {{ $labels.job_name }} failed"
            description: >
              The etcd backup job {{ $labels.job_name }} has failed.
              The cluster has been without a verified etcd snapshot since the
              last successful run. Check pod logs in namespace etcd-backup.

        - alert: EtcdSnapshotMissing
          expr: |
            (time() - max(kube_job_status_completion_time{namespace="etcd-backup", job_name=~"etcd-snapshot-.*"})) > (6 * 3600 + 1800)
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "No successful etcd snapshot in the last 6.5 hours"
            description: >
              The most recent successful etcd snapshot completed more than 6.5
              hours ago (schedule is every 4 hours). At least one job may have
              been skipped or is stuck. Check the etcd-backup namespace.
---
# ────────────────────────────────────────────────────────────────────────────
# Rook-Ceph cluster health
#
# Ceph metrics are exposed by rook-ceph-mgr via two scrape jobs:
#   job="rook-ceph-mgr"  (ServiceMonitor added by rook-ceph chart)
#   job="ceph-mgr"       (legacy / additional scrape)
# Where deduplication matters we filter to one job or use max by().
# ────────────────────────────────────────────────────────────────────────────
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: resilience-lab-ceph
  namespace: observability
  labels:
    release: kube-prometheus
spec:
  groups:

    # ──────────────────────────────────────────────────────────────────────────
    # Ceph overall health
    #
    # ceph_health_status: 0=OK, 1=WARN, 2=ERR
    # ──────────────────────────────────────────────────────────────────────────
    - name: ceph.health
      rules:

        - alert: CephHealthWarning
          expr: |
            max by (job) (ceph_health_status{job="rook-ceph-mgr"}) == 1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Ceph cluster is in HEALTH_WARN state"
            description: >
              The Ceph cluster has been reporting HEALTH_WARN for more than 5 minutes.
              Check `ceph status` on the rook-ceph toolbox pod for details.

        - alert: CephHealthError
          expr: |
            max by (job) (ceph_health_status{job="rook-ceph-mgr"}) == 2
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Ceph cluster is in HEALTH_ERR state"
            description: >
              The Ceph cluster has been reporting HEALTH_ERR for more than 2 minutes.
              Data availability may be impacted. Check the rook-ceph toolbox immediately.

    # ──────────────────────────────────────────────────────────────────────────
    # OSD health
    # ──────────────────────────────────────────────────────────────────────────
    - name: ceph.osd
      rules:

        # An OSD that is down is unable to serve data.
        - alert: CephOSDDown
          expr: |
            ceph_osd_up{job="rook-ceph-mgr"} == 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Ceph OSD {{ $labels.ceph_daemon }} is down"
            description: >
              OSD {{ $labels.ceph_daemon }} has been down for more than 5 minutes.
              If it stays down Ceph will begin backfilling data to the remaining OSDs.

        # An OSD marked out of the CRUSH map stops receiving new data.
        - alert: CephOSDOut
          expr: |
            ceph_osd_in{job="rook-ceph-mgr"} == 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Ceph OSD {{ $labels.ceph_daemon }} is marked out"
            description: >
              OSD {{ $labels.ceph_daemon }} is marked out of the CRUSH map.
              Data is being redistributed away from it. Check disk health in the rook-ceph namespace.

        # OSD fill level — warn at 75%, critical at 85%.
        # Uses ceph_osd_stat_bytes_used / ceph_osd_stat_bytes (per-OSD totals).
        - alert: CephOSDNearFull
          expr: |
            (
              max by (ceph_daemon) (ceph_osd_stat_bytes_used{job="rook-ceph-mgr"})
              /
              max by (ceph_daemon) (ceph_osd_stat_bytes{job="rook-ceph-mgr"})
            ) > 0.75
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Ceph OSD {{ $labels.ceph_daemon }} is {{ $value | humanizePercentage }} full"
            description: >
              OSD {{ $labels.ceph_daemon }} is {{ $value | humanizePercentage }} full.
              Ceph begins throttling writes when any OSD hits 85%. Add capacity or
              rebalance data before that threshold is reached.

        - alert: CephOSDFull
          expr: |
            (
              max by (ceph_daemon) (ceph_osd_stat_bytes_used{job="rook-ceph-mgr"})
              /
              max by (ceph_daemon) (ceph_osd_stat_bytes{job="rook-ceph-mgr"})
            ) > 0.85
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Ceph OSD {{ $labels.ceph_daemon }} is critically full ({{ $value | humanizePercentage }})"
            description: >
              OSD {{ $labels.ceph_daemon }} has exceeded 85% capacity. Ceph will
              mark it full and refuse writes. Immediate action required.

    # ──────────────────────────────────────────────────────────────────────────
    # MON quorum
    #
    # The cluster has 3 MONs. Quorum requires ≥ 2. If quorum is lost the
    # cluster becomes read-only.
    # ──────────────────────────────────────────────────────────────────────────
    - name: ceph.mon
      rules:

        - alert: CephMonQuorumAtRisk
          expr: |
            count by (job) (ceph_mon_quorum_status{job="rook-ceph-mgr"} == 1) < 2
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Ceph MON quorum is at risk (fewer than 2 MONs in quorum)"
            description: >
              Fewer than 2 Ceph monitors are currently in quorum. With a 3-MON
              cluster this means quorum may already be lost. The cluster will
              become read-only without quorum. Check MON pods in the rook-ceph namespace.

    # ──────────────────────────────────────────────────────────────────────────
    # Placement Group (PG) health
    #
    # Degraded PGs mean replicas are missing (data still accessible but not
    # fully protected). Inactive PGs mean IO is blocked.
    # ──────────────────────────────────────────────────────────────────────────
    - name: ceph.pg
      rules:

        - alert: CephPGsDegraded
          expr: |
            max by (job) (ceph_pg_degraded{job="rook-ceph-mgr"}) > 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "{{ $value }} Ceph placement groups are degraded"
            description: >
              {{ $value }} placement groups have been in degraded state for more than
              10 minutes. Data is still accessible but is not fully replicated.
              Monitor until backfill completes; investigate if count is rising.

        - alert: CephPGsNotActive
          expr: |
            (
              max by (job) (ceph_pg_total{job="rook-ceph-mgr"})
              -
              max by (job) (ceph_pg_active{job="rook-ceph-mgr"})
            ) > 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "{{ $value }} Ceph placement groups are not active"
            description: >
              {{ $value }} placement groups are not in active state. IO to affected
              data may be blocked. Check `ceph pg stat` in the rook-ceph toolbox.

    # ──────────────────────────────────────────────────────────────────────────
    # Cluster-wide capacity
    #
    # Pools expose max_avail (available headroom) and stored (used).
    # We aggregate across all pools for a cluster-level view.
    # ──────────────────────────────────────────────────────────────────────────
    - name: ceph.capacity
      rules:

        # Warn at 70% total cluster fill (used / (used + max_avail))
        - alert: CephClusterNearFull
          expr: |
            (
              sum(max by (pool_id) (ceph_pool_stored{job="rook-ceph-mgr"}))
              /
              (
                sum(max by (pool_id) (ceph_pool_stored{job="rook-ceph-mgr"}))
                +
                sum(max by (pool_id) (ceph_pool_max_avail{job="rook-ceph-mgr"}))
              )
            ) > 0.70
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Ceph cluster is {{ $value | humanizePercentage }} full"
            description: >
              Total Ceph cluster utilisation has exceeded 70% for 15 minutes.
              Plan capacity expansion — Ceph becomes unstable above 85%.

        # Critical at 80% — leaves headroom before the 85% OSD full threshold
        - alert: CephClusterCriticallyFull
          expr: |
            (
              sum(max by (pool_id) (ceph_pool_stored{job="rook-ceph-mgr"}))
              /
              (
                sum(max by (pool_id) (ceph_pool_stored{job="rook-ceph-mgr"}))
                +
                sum(max by (pool_id) (ceph_pool_max_avail{job="rook-ceph-mgr"}))
              )
            ) > 0.80
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Ceph cluster is critically full ({{ $value | humanizePercentage }})"
            description: >
              Total Ceph cluster utilisation has exceeded 80%. At 85% Ceph OSDs
              will be marked full and writes will be refused. Add capacity immediately.
---
# ────────────────────────────────────────────────────────────────────────────
# Platform infrastructure — Tier 1 & Tier 2 alerts
#
# NOTE: Several metrics here (cert-manager, ArgoCD, Vault, ingress-nginx,
# external-secrets) depend on ServiceMonitor label fixes committed alongside
# this file. They will be "no data" until ArgoCD syncs those apps and
# Prometheus picks up the new scrape targets.
# ────────────────────────────────────────────────────────────────────────────
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: resilience-lab-platform
  namespace: observability
  labels:
    release: kube-prometheus
spec:
  groups:

    # ──────────────────────────────────────────────────────────────────────────
    # TLS certificates — cert-manager managed certs
    #
    # certmanager_certificate_expiration_timestamp_seconds holds the Unix
    # expiry time for each Certificate object. We subtract time() to get
    # seconds remaining and alert on short windows.
    # ──────────────────────────────────────────────────────────────────────────
    - name: cert-manager
      rules:

        - alert: CertificateExpiringSoon
          expr: |
            (certmanager_certificate_expiration_timestamp_seconds - time()) < (30 * 24 * 3600)
          for: 1h
          labels:
            severity: warning
          annotations:
            summary: "Certificate {{ $labels.name }} expires in {{ $value | humanizeDuration }}"
            description: >
              Certificate {{ $labels.name }} in namespace {{ $labels.namespace }}
              (issuer: {{ $labels.issuer_name }}) expires in
              {{ $value | humanizeDuration }}.
              cert-manager should be auto-renewing this — check Certificate
              and CertificateRequest status in that namespace.

        - alert: CertificateExpiringCritical
          expr: |
            (certmanager_certificate_expiration_timestamp_seconds - time()) < (7 * 24 * 3600)
          for: 15m
          labels:
            severity: critical
          annotations:
            summary: "Certificate {{ $labels.name }} expires in {{ $value | humanizeDuration }} — CRITICAL"
            description: >
              Certificate {{ $labels.name }} in namespace {{ $labels.namespace }}
              expires in {{ $value | humanizeDuration }}.
              Renewal has likely failed. Investigate immediately — HTTPS traffic
              will break when the cert expires.

    # ──────────────────────────────────────────────────────────────────────────
    # Velero PVC backups
    #
    # velero_backup_last_successful_timestamp is a Unix timestamp of the last
    # successful backup for each schedule. Daily schedule runs at 02:00 UTC;
    # alert if nothing succeeded in 26 hours.
    # ──────────────────────────────────────────────────────────────────────────
    - name: velero
      rules:

        - alert: VeleroBackupMissing
          expr: |
            (time() - velero_backup_last_successful_timestamp{schedule="daily-pvc-backup"}) > (26 * 3600)
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "No successful Velero backup in the last 26 hours"
            description: >
              The daily-pvc-backup schedule last succeeded
              {{ $value | humanizeDuration }} ago. A full day of PVC changes
              is unprotected. Check Velero pod logs and BackupStorageLocation
              status in the velero namespace.

    # ──────────────────────────────────────────────────────────────────────────
    # ArgoCD application sync & health
    #
    # argocd_app_info carries sync_status and health_status label values.
    # OutOfSync for > 15 min likely means a sync is stuck or was blocked.
    # Degraded health means the app's pods/resources are unhealthy.
    # ──────────────────────────────────────────────────────────────────────────
    - name: argocd
      rules:

        - alert: ArgoCDAppOutOfSync
          expr: |
            argocd_app_info{sync_status="OutOfSync"} == 1
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "ArgoCD app {{ $labels.name }} is OutOfSync"
            description: >
              Application {{ $labels.name }} (project: {{ $labels.project }})
              has been OutOfSync for more than 15 minutes.
              Check the ArgoCD UI for sync errors or a blocking manual approval.

        - alert: ArgoCDAppDegraded
          expr: |
            argocd_app_info{health_status="Degraded"} == 1
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "ArgoCD app {{ $labels.name }} health is Degraded"
            description: >
              Application {{ $labels.name }} (project: {{ $labels.project }})
              has been in Degraded health for more than 5 minutes.
              This usually means pods are crash-looping or PVCs are unbound.
              Check the ArgoCD UI and the app's namespace.

    # ──────────────────────────────────────────────────────────────────────────
    # Vault — seal status
    #
    # vault_core_unsealed == 1 when healthy, 0 when sealed.
    # Single-replica; if sealed, ESO and all secret-dependent apps break.
    # ──────────────────────────────────────────────────────────────────────────
    - name: vault
      rules:

        - alert: VaultSealed
          expr: |
            vault_core_unsealed == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Vault is sealed"
            description: >
              The Vault instance has been sealed for more than 2 minutes.
              The postStart auto-unseal hook may have failed.
              All External Secrets refreshes and any app that reads from Vault
              will fail until it is unsealed. Exec into the vault pod and run
              `vault operator unseal` with the unseal keys from the
              vault-unseal-keys secret.

    # ──────────────────────────────────────────────────────────────────────────
    # External Secrets Operator — sync failures
    #
    # externalsecret_sync_calls_error_total increments on each failed sync
    # attempt for an ExternalSecret. Any errors here mean apps may get stale
    # or missing secrets on their next restart.
    # ──────────────────────────────────────────────────────────────────────────
    - name: external-secrets
      rules:

        - alert: ExternalSecretSyncFailed
          expr: |
            increase(externalsecret_sync_calls_error_total[10m]) > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "ExternalSecret {{ $labels.name }} sync is failing"
            description: >
              ExternalSecret {{ $labels.name }} in namespace {{ $labels.namespace }}
              has had sync errors in the last 10 minutes. The secret may be
              stale. Common causes: Vault sealed, expired Kubernetes auth token,
              or a policy change blocking the ESO service account.

    # ──────────────────────────────────────────────────────────────────────────
    # Talos node disk — /var and /system/state (xfs volumes only)
    #
    # Talos nodes have two real filesystems on each node:
    #   /var           — container images, kubelet state, logs
    #   /system/state  — Talos state (machine config, certs)
    # All other mounts are tmpfs and are excluded.
    # ──────────────────────────────────────────────────────────────────────────
    - name: node.disk
      rules:

        - alert: TalosNodeDiskPressure
          expr: |
            (
              node_filesystem_avail_bytes{fstype="xfs"}
              /
              node_filesystem_size_bytes{fstype="xfs"}
            ) < 0.20
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Node {{ $labels.instance }} {{ $labels.mountpoint }} is {{ $value | humanizePercentage }} free"
            description: >
              Filesystem {{ $labels.mountpoint }} on node {{ $labels.instance }}
              has less than 20% space remaining. On Talos, /var holds container
              images and kubelet state — if it fills up pods will fail to start.
              Run `talosctl disks` and check for large logfiles or unused images.

        - alert: TalosNodeDiskCritical
          expr: |
            (
              node_filesystem_avail_bytes{fstype="xfs"}
              /
              node_filesystem_size_bytes{fstype="xfs"}
            ) < 0.10
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Node {{ $labels.instance }} {{ $labels.mountpoint }} is critically low ({{ $value | humanizePercentage }} free)"
            description: >
              Filesystem {{ $labels.mountpoint }} on node {{ $labels.instance }}
              has less than 10% space remaining. Pod scheduling failures are
              imminent. Run `crictl images` to find large images, or check
              /var/log for runaway log files.

    # ──────────────────────────────────────────────────────────────────────────
    # Ingress-nginx — HTTP 5xx error rate
    #
    # nginx_ingress_controller_requests is labeled by ingress, namespace, and
    # status. We alert when any ingress sustains > 5% 5xx rate for 5 minutes.
    # ──────────────────────────────────────────────────────────────────────────
    - name: ingress-nginx
      rules:

        - alert: IngressHighErrorRate
          expr: |
            (
              sum by (ingress, namespace) (
                rate(nginx_ingress_controller_requests{status=~"5.."}[5m])
              )
              /
              sum by (ingress, namespace) (
                rate(nginx_ingress_controller_requests[5m])
              )
            ) > 0.05
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Ingress {{ $labels.namespace }}/{{ $labels.ingress }} 5xx rate is {{ $value | humanizePercentage }}"
            description: >
              More than 5% of requests through ingress {{ $labels.ingress }}
              (namespace {{ $labels.namespace }}) are returning 5xx errors.
              Check the backing service pods and ingress controller logs.

    # ──────────────────────────────────────────────────────────────────────────
    # Recyclarr — quality profile sync job
    #
    # Recyclarr runs as a CronJob in the media namespace daily at 03:00 UTC.
    # A failure means Sonarr/Radarr quality profiles silently drift from
    # TRaSH Guides recommendations.
    # ──────────────────────────────────────────────────────────────────────────
    - name: media.jobs
      rules:

        - alert: RecyclarrSyncFailed
          expr: |
            kube_job_status_failed{namespace="media", job_name=~"recyclarr-.*"} > 0
          for: 1m
          labels:
            severity: warning
            namespace: media
          annotations:
            summary: "Recyclarr sync job {{ $labels.job_name }} failed"
            description: >
              The Recyclarr CronJob has failed. Sonarr and Radarr quality
              profiles will drift from TRaSH Guides until the next successful
              run. Check pod logs in the media namespace.
