apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: lux-webhook-token
  namespace: observability
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: lux-webhook-token
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: token
      remoteRef:
        key: secret/resilience-lab/lux
        property: webhook-token
