apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: loki
    targetRevision: "6.55.0"
    helm:
      values: |
        deploymentMode: SingleBinary
        singleBinary:
          replicas: 1
          persistence:
            storageClass: truenas-nfs
            size: 20Gi
        loki:
          auth_enabled: false
          commonConfig:
            replication_factor: 1
          schemaConfig:
            configs:
              - from: "2024-01-01"
                store: tsdb
                object_store: filesystem
                schema: v13
                index:
                  prefix: index_
                  period: 24h
          limits_config:
            retention_period: 744h
          storage:
            type: filesystem
        backend:
          replicas: 0
        read:
          replicas: 0
        write:
          replicas: 0
        monitoring:
          selfMonitoring:
            enabled: false
            grafanaAgent:
              installOperator: false
        gateway:
          enabled: false
        minio:
          enabled: false
        chunksCache:
          enabled: false
        resultsCache:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
