# Pulls the AKT wallet mnemonic from Vault into the akash-services namespace.
# The mnemonic is NEVER written to git — it lives only in Vault.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: akash-wallet
  namespace: akash-services
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: akash-wallet
    creationPolicy: Owner
  data:
    - secretKey: mnemonic
      remoteRef:
        key: secret/resilience-lab/akash
        property: mnemonic
