# cert-manager issues TLS for teleport.madavigo.com via Cloudflare DNS-01
# Teleport proxy mounts this directly -- not terminated by ingress-nginx
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: teleport-tls
  namespace: teleport
spec:
  secretName: teleport-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - teleport.madavigo.com
    - "*.teleport.madavigo.com"
