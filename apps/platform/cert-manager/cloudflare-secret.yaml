# ClusterExternalSecret — distributes the Cloudflare API token to every namespace
# that holds a cert-manager Certificate using the letsencrypt-prod ClusterIssuer.
#
# WHY THIS IS NEEDED
# cert-manager's challenges controller looks for the DNS-01 solver secret in the
# SAME NAMESPACE as the Certificate (challenge namespace), despite the ClusterIssuer
# being cluster-scoped. This means the secret must exist in every namespace that
# has a Certificate using Cloudflare DNS-01.
#
# This ClusterExternalSecret pulls the token from Vault once and syncs it to all
# cert-holding namespaces. Add a namespace here whenever a new Certificate is
# added that uses letsencrypt-prod.
apiVersion: external-secrets.io/v1
kind: ClusterExternalSecret
metadata:
  name: cloudflare-api-token
spec:
  # Explicit namespace list — one secret per namespace where cert-manager
  # Certificates using Cloudflare DNS-01 exist.
  namespaces:
    - argo-events
    - argo-workflows
    - argocd
    - authentik
    - cert-manager
    - homepage
    - lux
    - media
    - navidrome
    - observability
    - rook-ceph
    - teleport
    - toothy
    - vault

  refreshTime: 1h

  externalSecretSpec:
    refreshInterval: 1h
    secretStoreRef:
      name: vault-backend
      kind: ClusterSecretStore
    target:
      name: cloudflare-api-token
      creationPolicy: Owner
    data:
      - secretKey: api-token
        remoteRef:
          key: secret/resilience-lab/cert-manager
          property: cloudflare-api-token
