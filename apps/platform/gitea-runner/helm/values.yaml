runner:
  image: gitea/act_runner:0.2.11
  replicas: 1

  gitea:
    instanceURL: https://git.madavigo.com
    # Registration token pulled from Vault via ExternalSecret.
    # To get the token: Gitea → Site Admin → Runners → Create new runner.
    # Store it at: vault kv put secret/resilience-lab/gitea-runner registration-token=<value>
    registrationTokenSecret:
      name: gitea-runner-secrets
      key: registration-token

  # Labels advertised to Gitea — workflows use `runs-on: ubuntu-latest` or
  # `runs-on: self-hosted` to target this runner.
  #
  # Image choice: catthehacker/ubuntu:act-latest is the reference image for
  # nektos/act and Gitea Actions. It has the standard GitHub Actions tool-cache
  # (Python, Node, Go, Java, etc.) and sets $ImageOS=ubuntu22 so actions like
  # setup-python, setup-node, and setup-go resolve prebuilt tarballs correctly.
  # node:20-bullseye (previous image) is too minimal — setup-python fails with
  # "version was not found for this operating system" because it lacks
  # $ImageOS/tool-cache and has no python-versions manifest match for Debian 11.
  # Trade-off: ~1.5GB first pull vs ~1GB for node:20-bullseye; cached thereafter.
  labels: "ubuntu-latest:docker://catthehacker/ubuntu:act-latest,self-hosted:docker://catthehacker/ubuntu:act-latest"

  # Number of concurrent jobs this runner will execute.
  capacity: 2

dind:
  image: docker:27.5.1-dind
  # DinD requires privileged to manage its own namespaces/cgroups. This is a
  # known trade-off for self-hosted runners. Compensating controls:
  #   - NetworkPolicy (templates/netpol.yaml) blocks egress to the K8s API,
  #     Vault, and all other cluster-internal CIDRs; only Gitea (10.10.67.1)
  #     and external HTTP(S) for registries/actions are allowed.
  #   - Gitea Actions runner registration scope limits which repos/orgs can
  #     dispatch jobs (managed in Gitea Site Admin → Runners).
  #   - TODO: add dedicated node taint/toleration so the runner does not
  #     co-schedule with sensitive workloads. Tracked separately.
  privileged: true
  # /var/lib/docker MUST be node-local. Previously backed by truenas-nfs, which
  # forced dind to fall back to storage-driver=vfs (overlay2 mount fails on NFS:
  # "failed to mount overlay: invalid argument"). VFS + NFS then deadlocks on
  # POST /containers/create (hangs indefinitely, no daemon log output) — this
  # was the root cause of every job silently stalling after the
  # "docker create" log line. Using emptyDir lets overlay2 work natively.
  # Trade-off: image cache is lost on pod restart (~1GB node:20-bullseye
  # re-pull), which is acceptable for this runner's volume of work.
  storage:
    type: emptyDir            # set to "pvc" to use a PersistentVolumeClaim
    sizeLimit: 20Gi           # kubelet-enforced cap on emptyDir (du-scanned, ~1m interval)
    # storageClass: local-path   # required when type=pvc
    # storageSize: 20Gi          # required when type=pvc

runnerData:
  # Persists the .runner registration state so the runner does not re-register
  # on every pod restart (which would accumulate stale entries in Gitea).
  storageClass: truenas-nfs
  storageSize: 1Gi

imagePullSecrets:
  - name: gitea-registry

resources:
  runner:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  dind:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 4000m
      memory: 4Gi

vault:
  secretPath: secret/resilience-lab/gitea-runner
