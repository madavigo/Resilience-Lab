apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitea-runner
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.runner.replicas }}
  # Rolling updates would cause two runners to briefly share the DinD PVC
  # (ReadWriteOnce). Recreate is safer.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: gitea-runner
  template:
    metadata:
      labels:
        app: gitea-runner
    spec:
      serviceAccountName: gitea-runner
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        # ── act runner ───────────────────────────────────────────────────────
        - name: runner
          image: {{ .Values.runner.image }}
          command:
            - sh
            - -c
            - |
              # Wait for DinD to generate TLS certs before proceeding.
              # Must run inline here (not an init container) because DinD starts
              # in parallel with main containers, not before them.
              until [ -f /certs/client/ca.pem ]; do
                echo "waiting for docker TLS certs..."; sleep 2
              done

              # Only register if .runner state file is absent — prevents accumulating
              # stale runner entries in Gitea on every pod restart.
              if [ ! -f /data/.runner ]; then
                act_runner register \
                  --config   /config/config.yaml \
                  --instance "$GITEA_INSTANCE_URL" \
                  --token    "$GITEA_RUNNER_REGISTRATION_TOKEN" \
                  --name     "resilience-lab-runner" \
                  --labels   "$GITEA_RUNNER_LABELS" \
                  --no-interactive
              fi
              exec act_runner daemon --config /config/config.yaml
          env:
            - name: GITEA_INSTANCE_URL
              value: {{ .Values.runner.gitea.instanceURL | quote }}
            - name: GITEA_RUNNER_REGISTRATION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.runner.gitea.registrationTokenSecret.name }}
                  key: {{ .Values.runner.gitea.registrationTokenSecret.key }}
            - name: GITEA_RUNNER_LABELS
              value: {{ .Values.runner.labels | quote }}
            - name: DOCKER_HOST
              value: tcp://localhost:2376
            - name: DOCKER_TLS_VERIFY
              value: "1"
            - name: DOCKER_CERT_PATH
              value: /certs/client
          resources:
            {{- toYaml .Values.resources.runner | nindent 12 }}
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "[ -f /data/.runner ]"
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - "[ -f /data/.runner ]"
            initialDelaySeconds: 15
            periodSeconds: 10
          volumeMounts:
            - name: docker-certs
              mountPath: /certs
              readOnly: true
            - name: runner-data
              mountPath: /data
            - name: runner-config
              mountPath: /config

        # ── Docker-in-Docker ─────────────────────────────────────────────────
        - name: dind
          image: {{ .Values.dind.image }}
          securityContext:
            privileged: {{ .Values.dind.privileged }}
          # Match dockerd's default MTU to the pod CNI MTU. The pod's eth0 is
          # {{ .Values.dind.mtu }} bytes (VXLAN overlay overhead), but dockerd
          # defaults to 1500 — so any packet > pod-MTU leaving a job container
          # gets silently dropped by the overlay (ICMP "frag needed" is also
          # dropped). Symptom: TLS handshakes hang mid-way, `curl` reports
          # "Connection reset by peer" or times out on large responses.
          args:
            - "--mtu={{ .Values.dind.mtu }}"
          env:
            - name: DOCKER_TLS_CERTDIR
              value: /certs
          resources:
            {{- toYaml .Values.resources.dind | nindent 12 }}
          volumeMounts:
            - name: docker-certs
              mountPath: /certs
            - name: dind-storage
              mountPath: /var/lib/docker
            {{- if .Values.runner.ghcrPullAuth.enabled }}
            # Docker reads $HOME/.docker/config.json for registry credentials.
            # Mounting the dockerconfigjson secret here authenticates all
            # `docker pull` calls dind makes during jobs (e.g. ghcr.io images).
            - name: ghcr-docker-config
              mountPath: /root/.docker
              readOnly: true
            {{- end }}

      volumes:
        - name: docker-certs
          emptyDir: {}
        - name: runner-data
          persistentVolumeClaim:
            claimName: runner-data
        - name: runner-config
          configMap:
            name: gitea-runner-config
        - name: dind-storage
          {{- if eq (.Values.dind.storage.type | default "emptyDir") "pvc" }}
          persistentVolumeClaim:
            claimName: dind-storage
          {{- else }}
          emptyDir:
            sizeLimit: {{ .Values.dind.storage.sizeLimit | default "20Gi" }}
          {{- end }}
        {{- if .Values.runner.ghcrPullAuth.enabled }}
        - name: ghcr-docker-config
          secret:
            secretName: gitea-runner-ghcr-pull
            # dockerconfigjson secrets store data under `.dockerconfigjson`;
            # docker expects `config.json` at $HOME/.docker/, so rename here.
            items:
              - key: .dockerconfigjson
                path: config.json
        {{- end }}
