apiVersion: v1
kind: ConfigMap
metadata:
  name: gitea-runner-config
  namespace: {{ .Release.Namespace }}
data:
  config.yaml: |
    log:
      level: info
    runner:
      file: /data/.runner
      capacity: {{ .Values.runner.capacity }}
      envs:
        DOCKER_HOST: tcp://localhost:2376
        DOCKER_TLS_VERIFY: "1"
        DOCKER_CERT_PATH: /certs/client
      # Labels override: also set via env var GITEA_RUNNER_LABELS below
    cache:
      enabled: true
      dir: /data/cache
    container:
      network: bridge
      privileged: false
      volumes:
        - /certs/client:/certs/client:ro
      # `options: "--platform linux/amd64"` was previously set to pin jobs
      # to amd64, but act_runner v0.2.11 silently swallows the
      # container-create call when --platform is combined with a
      # label-mapped image (ubuntu-latest:docker://node:20-bullseye). The
      # runner emits "🐳 docker create ... platform= ..." at debug level
      # and then never issues the HTTP POST to dind — no error, no warn,
      # no event. All cluster nodes are amd64, so omitting the option
      # leaves dind to default to its native platform, which is correct.
