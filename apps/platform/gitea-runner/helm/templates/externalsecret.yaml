apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitea-runner-secrets
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: gitea-runner-secrets
    creationPolicy: Owner
  data:
    - secretKey: registration-token
      remoteRef:
        key: {{ .Values.vault.secretPath }}
        property: registration-token
{{- if .Values.runner.ghcrPullAuth.enabled }}
---
# Dockerconfigjson for the dind sidecar to authenticate `docker pull` calls
# against ghcr.io. See values.yaml runner.ghcrPullAuth for rationale. The
# template renders the standard docker config format from two Vault keys.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitea-runner-ghcr-pull
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: gitea-runner-ghcr-pull
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {"auths":{"ghcr.io":{"auth":"{{ `{{ printf "%s:%s" .username .token | b64enc }}` }}"}}}
  data:
    - secretKey: username
      remoteRef:
        key: {{ .Values.vault.secretPath }}
        property: ghcr-username
    - secretKey: token
      remoteRef:
        key: {{ .Values.vault.secretPath }}
        property: ghcr-token
{{- end }}
