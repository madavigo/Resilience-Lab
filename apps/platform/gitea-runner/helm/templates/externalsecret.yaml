apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitea-runner-secrets
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: gitea-runner-secrets
    creationPolicy: Owner
  data:
    - secretKey: registration-token
      remoteRef:
        key: {{ .Values.vault.secretPath }}
        property: registration-token
{{- if .Values.runner.ghcrPullAuth.enabled }}
---
# Dockerconfigjson for the dind sidecar to authenticate `docker pull` calls
# against ghcr.io. See values.yaml runner.ghcrPullAuth for rationale.
#
# Failure behaviour: if this Secret is absent (Vault unreachable + secret
# manually deleted) the dind volumeMount will prevent the pod from starting.
# This is intentional — a missing credential should be loud, not silent
# (silent failure would fall back to anonymous pulls and hit rate limits
# without any alert). Ensure Vault availability before rolling the pod.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitea-runner-ghcr-pull
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: gitea-runner-ghcr-pull
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      # engineVersion: v2 is required for Sprig functions (b64enc etc.) in ESO
      # templates. Without it the default engine silently produces wrong output.
      engineVersion: v2
      data:
        # Use username+password rather than a manually-assembled auth blob.
        # Docker accepts both forms; this avoids any b64enc edge cases and is
        # more readable. ESO v2 substitutes .username/.token from the data
        # block below at secret-build time — nothing sensitive appears in git.
        # Helm backtick-quoting passes the inner template expressions through
        # to ESO's v2 engine at secret-build time. Helm never sees .username
        # or .token — ESO substitutes them from the data block at sync time.
        .dockerconfigjson: '{"auths":{"ghcr.io":{"username":"{{ `{{ .username }}` }}","password":"{{ `{{ .token }}` }}"}}}'
  data:
    - secretKey: username
      remoteRef:
        key: {{ .Values.vault.secretPath }}
        property: ghcr-username
    - secretKey: token
      remoteRef:
        key: {{ .Values.vault.secretPath }}
        property: ghcr-token
{{- end }}
