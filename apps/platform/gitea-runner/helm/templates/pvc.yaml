{{- if eq (.Values.dind.storage.type | default "emptyDir") "pvc" }}
{{- if not .Values.dind.storage.storageClass }}
{{- fail "dind.storage.storageClass is required when dind.storage.type=pvc" }}
{{- end }}
{{- if not .Values.dind.storage.storageSize }}
{{- fail "dind.storage.storageSize is required when dind.storage.type=pvc" }}
{{- end }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dind-storage
  namespace: {{ .Release.Namespace }}
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.dind.storage.storageClass }}
  resources:
    requests:
      storage: {{ .Values.dind.storage.storageSize }}
{{- end }}
---
# Persists act_runner's .runner registration file so re-registration is skipped
# on pod restarts and stale Gitea runner entries are not accumulated.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: runner-data
  namespace: {{ .Release.Namespace }}
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.runnerData.storageClass }}
  resources:
    requests:
      storage: {{ .Values.runnerData.storageSize }}
