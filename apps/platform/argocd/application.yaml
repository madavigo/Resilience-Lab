# ArgoCD self-manages its own upgrade via GitOps
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://argoproj.github.io/argo-helm
    chart: argo-cd
    targetRevision: "7.7.0"
    helm:
      values: |
        global:
          domain: argocd.madavigo.com
        controller:
          metrics:
            enabled: true
            serviceMonitor:
              enabled: true
              additionalLabels:
                release: kube-prometheus
          # Cap blast radius of reconcile storms. Without limits the
          # application-controller runs BestEffort and can monopolize a node
          # (see issue #20: stuck Terminating PVC drove it to ~1.6 sustained
          # cores on resilience-nuc, contributing to a 6.67x load-per-core
          # alert). Requests sized above observed steady-state (~0.15 cores,
          # ~641Mi); CPU limit chosen so even a full-throttle storm uses
          # <=25% of the 8-core NUC.
          resources:
            requests:
              cpu: 250m
              memory: 768Mi
            limits:
              cpu: 2000m
              memory: 1536Mi
        applicationSet:
          metrics:
            enabled: true
            serviceMonitor:
              enabled: true
              additionalLabels:
                release: kube-prometheus
        server:
          ingress:
            enabled: true
            ingressClassName: nginx
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-prod
              nginx.ingress.kubernetes.io/auth-url: http://ak-outpost-nginx-outpost.authentik.svc.cluster.local:9000/outpost.goauthentik.io/auth/nginx
              nginx.ingress.kubernetes.io/auth-signin: https://auth.madavigo.com/outpost.goauthentik.io/start?rd=$scheme://$host$escaped_request_uri
              nginx.ingress.kubernetes.io/auth-response-headers: Set-Cookie,X-authentik-username,X-authentik-groups,X-authentik-entitlements,X-authentik-email,X-authentik-name,X-authentik-uid
            tls: true
          metrics:
            enabled: true
            serviceMonitor:
              enabled: true
              additionalLabels:
                release: kube-prometheus
        configs:
          params:
            server.insecure: "true"
          credentialTemplates: {}
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
