# ArgoCD self-manages its own upgrade via GitOps
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://argoproj.github.io/argo-helm
    chart: argo-cd
    targetRevision: "7.7.0"
    helm:
      values: |
        global:
          domain: argocd.lab.local   # update to match your DNS
        server:
          ingress:
            enabled: true
            ingressClassName: nginx
            annotations:
              cert-manager.io/cluster-issuer: selfsigned-issuer
            tls: true
        configs:
          params:
            # Force HTTPS redirect
            server.insecure: "false"
          # Repo credential template — no secrets in git, ESO injects them
          credentialTemplates: {}
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
