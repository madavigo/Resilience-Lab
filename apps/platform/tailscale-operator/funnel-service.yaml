apiVersion: v1
kind: Service
metadata:
  name: teleport-funnel
  namespace: teleport
  annotations:
    tailscale.com/funnel: "true"
    tailscale.com/hostname: "teleport"
spec:
  type: LoadBalancer
  loadBalancerClass: tailscale
  selector:
    app.kubernetes.io/name: teleport-cluster
    app.kubernetes.io/component: proxy
    app.kubernetes.io/instance: teleport
  ports:
    - name: https
      port: 443
      targetPort: 443
      protocol: TCP
