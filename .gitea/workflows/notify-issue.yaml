name: Notify on Issue Opened

on:
  issues:
    types: [opened]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send ntfy notification
        run: |
          curl -s \
            -H "Title: [Resilience-Lab] New Issue: ${{ github.event.issue.title }}" \
            -H "Priority: default" \
            -H "Tags: rotating_light" \
            -H "Click: ${{ github.event.issue.html_url }}" \
            -d "#${{ github.event.issue.number }} opened by ${{ github.event.issue.user.login }}

${{ github.event.issue.body }}" \
            "https://ntfy.sh/${{ secrets.NTFY_TOPIC }}"
