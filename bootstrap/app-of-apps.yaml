# App-of-Apps root Application
# This single manifest is the only thing applied manually.
# ArgoCD reads this repo and deploys all child Applications in dependency order.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: resilience-lab-root
  namespace: argocd
  # Ensure ArgoCD doesn't delete child apps when root is removed
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/madavigo/Resilience-Lab.git
    targetRevision: main
    path: apps
    directory:
      recurse: true
      include: "**/application.yaml"
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  ignoreDifferences:
    - group: argoproj.io
      kind: Application
      jsonPointers:
        - /metadata/labels/argocd.argoproj.io~1instance
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
